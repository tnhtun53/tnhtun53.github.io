<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>T & M | Neon Hacker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="hacker-theme">
    <header>
        <h1 class="center-title neon-glow">T & M</h1>
        <nav class="center-menu">
            <button onclick="showPage('home')" class="neon-btn">HOME</button>
            <button onclick="showPage('note')" class="neon-btn">NOTE</button>
        </nav>
    </header>

    <main>
        <!-- Home Page with Fixed Layout -->
        <div id="home" class="page">
            <div class="fixed-grid">
                <div class="box neon-border">
                    <h3 class="neon-text">1. Hacking Tutorial</h3>
                    <ul class="links">
                        <li><a href="https://www.hackthebox.com" target="_blank">>> HackTheBox</a></li>
                        <li><a href="https://tryhackme.com" target="_blank">>> TryHackMe</a></li>
                    </ul>
                </div>
                <div class="box neon-border">
                    <h3 class="neon-text">2. Pentesting Lab</h3>
                    <ul class="links">
                        <li><a href="https://www.vulnhub.com" target="_blank">>> VulnHub</a></li>
                        <li><a href="https://www.offensive-security.com" target="_blank">>> OSCP Lab</a></li>
                    </ul>
                </div>
                <div class="box neon-border">
                    <h3 class="neon-text">3. Online Learning</h3>
                    <ul class="links">
                        <li><a href="https://www.udemy.com" target="_blank">>> Udemy</a></li>
                        <li><a href="https://www.coursera.org" target="_blank">>> Coursera</a></li>
                    </ul>
                </div>
                <div class="box neon-border">
                    <h3 class="neon-text">4. YouTube Channel</h3>
                    <ul class="links">
                        <li><a href="https://www.youtube.com" target="_blank">>> NetworkChuck</a></li>
                        <li><a href="https://www.youtube.com" target="_blank">>> IppSec</a></li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- Note Page with Rainbow Animation -->
        <div id="note" class="page" style="display:none;">
            <div class="rainbow-container">
                <h2 class="rainbow-animation">I love MonMon</h2>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
